# Bifrost Milestone 1 dev environment — stock CCH regression baseline.
#
# Topology mirrors upstream fiber e2e CI (tests/nodes/start.sh) with one
# compose service per process. All node services share ONE network namespace
# (network_mode: service:netbase) because the fiber test harness — including
# the compiled udt-init tool and every generated config.yml — assumes
# 127.0.0.1. Nothing from the chain/node layer is published to the host:
# drive it via `docker compose exec` (see scripts/). Ports inside the
# namespace:
#   ckb rpc 8114 · fnn-client rpc 21714 · fnn-hub rpc 21716 (spec's "8227"
#   is the public-testnet convention; dev configs are generated by udt-init)
#   lnd-hub rpc 10009 / rest 8080 · lnd-payee rpc 11009 / rest 8180
#   bitcoind rpc 18443
#
# ONE deliberate exception: bifrostd's api/ gateway (port 8391) IS published,
# 127.0.0.1-only, because it's the one surface meant for a HOST process
# (the dashboard's Vite dev server) to reach — everything else in this file
# only ever talks to itself inside the namespace. `network_mode:
# service:netbase` means whoever owns the namespace publishes for everyone
# sharing it, hence `ports:` lives on netbase, not on the bifrostd service
# block itself.
name: bifrost-dev

x-vendor-volume: &vendor
  volumes:
    - ./vendor/fiber-0.9.0-rc7:/work

services:
  netbase:
    image: alpine:3.20
    command: ["sleep", "infinity"]
    ports:
      - "127.0.0.1:8391:8391"
    init: true

  ckb:
    build:
      context: .
      dockerfile: images/chain-init/Dockerfile
      args:
        UDT_INIT_BIN: ${UDT_INIT_BIN:-}
        UDT_INIT_STAGE: ${UDT_INIT_STAGE:-udt-builder}
    network_mode: "service:netbase"
    <<: *vendor
    depends_on: [netbase]
    healthcheck:
      test: ["CMD-SHELL", "test -f /work/.chain-ready"]
      interval: 5s
      timeout: 3s
      retries: 120
      start_period: 30s

  bitcoind:
    image: bitcoin/bitcoin:29
    network_mode: "service:netbase"
    depends_on: [netbase]
    command:
      - bitcoind
      - -regtest
      - -server=1
      - -txindex=1
      - -fallbackfee=0.0001
      - -rpcuser=${BITCOIN_RPC_USER:?set in deploy/.env}
      - -rpcpassword=${BITCOIN_RPC_PASS:?set in deploy/.env}
      - -zmqpubrawblock=tcp://127.0.0.1:28332
      - -zmqpubrawtx=tcp://127.0.0.1:28333
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -regtest -rpcuser=$${BITCOIN_RPC_USER} -rpcpassword=$${BITCOIN_RPC_PASS} getblockchaininfo || exit 1"]
      interval: 5s
      retries: 30
    environment:
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER}
      BITCOIN_RPC_PASS: ${BITCOIN_RPC_PASS}

  # Hub-side LND ("ingrid" in upstream naming). Official release images ship
  # with all subservers incl. invoicesrpc/routerrpc; smoke-cch.sh verifies
  # hold-invoice support at runtime instead of trusting this.
  lnd-hub:
    image: lightninglabs/lnd:v0.19.2-beta
    network_mode: "service:netbase"
    <<: *vendor
    depends_on:
      bitcoind: { condition: service_healthy }
    command:
      - lnd
      - --lnddir=/work/tests/deploy/lnd-init/lnd-ingrid
      - --bitcoind.rpcuser=${BITCOIN_RPC_USER}
      - --bitcoind.rpcpass=${BITCOIN_RPC_PASS}

  lnd-payee:
    image: lightninglabs/lnd:v0.19.2-beta
    network_mode: "service:netbase"
    <<: *vendor
    depends_on:
      bitcoind: { condition: service_healthy }
    command:
      - lnd
      - --lnddir=/work/tests/deploy/lnd-init/lnd-bob
      - --bitcoind.rpcuser=${BITCOIN_RPC_USER}
      - --bitcoind.rpcpass=${BITCOIN_RPC_PASS}

  # Fiber node 1 — the "client" side that pays wrapped BTC to the hub.
  fnn-client:
    image: nervos/fiber:0.9.0-rc7
    network_mode: "service:netbase"
    <<: *vendor
    working_dir: /work/tests/nodes
    command: ["fnn", "-d", "/work/tests/nodes/1"]
    environment:
      FIBER_SECRET_KEY_PASSWORD: ${FNN_CLIENT_KEY_PASSWORD:?set in deploy/.env}
      TESTING_CONTRACTS_DIR: /work/tests/deploy/contracts
      RUST_LOG: ${FNN_RUST_LOG:-info,fnn=debug}
    depends_on:
      ckb: { condition: service_healthy }

  # Fiber node 3 — the hub; udt-init generates its config with the cch
  # service enabled and the LND (ingrid) connection settings.
  fnn-hub:
    image: nervos/fiber:0.9.0-rc7
    network_mode: "service:netbase"
    <<: *vendor
    working_dir: /work/tests/nodes
    command: ["fnn", "-d", "/work/tests/nodes/3"]
    environment:
      FIBER_SECRET_KEY_PASSWORD: ${FNN_HUB_KEY_PASSWORD:?set in deploy/.env}
      TESTING_CONTRACTS_DIR: /work/tests/deploy/contracts
      RUST_LOG: ${FNN_RUST_LOG:-info,fnn=debug}
    depends_on:
      ckb: { condition: service_healthy }
      lnd-hub: { condition: service_started }

  # Bifrost daemon runtime. The repo is mounted at /repo and built on the
  # host (pure-JS deps only — see bifrostd/src/orders/store.ts for why);
  # smoke-bifrost.sh ALSO drives one-shot swaps via `compose exec bifrostd
  # node …` inside the shared namespace — that keeps working unmodified
  # alongside the long-running server below (separate process, same
  # container). glibc image (not alpine): host-installed node_modules must
  # resolve as-is.
  #
  # The api/ HTTP+WS gateway (bifrostd/src/index.js) needs a host build
  # first (`npm run build` in bifrostd/, or `npm run dev`) — the container
  # can't build its own dist/ (host-installed node_modules). Rather than
  # fail on first `docker compose up` before that build exists, wait for it:
  # the server starts itself the moment dist/index.js appears, no restart
  # needed. UDT_CODE_HASH/WBTC_ARGS mirror deploy/scripts/lib.sh's constants
  # (same fixed dev-chain deployment) — keep both in sync if either changes.
  bifrostd:
    image: node:22-bookworm-slim
    network_mode: "service:netbase"
    volumes:
      - ..:/repo
    environment:
      UDT_CODE_HASH: "0xe1e354d6d643ad42724d40967e334984534e0367405c5ae42a9d7d63d77df419"
      WBTC_ARGS: "0x32e555f3ff8e135cece1351a6a2971518392c1e30375c1e006ad0ce8eac07947"
      ORDER_STORE_PATH: /tmp/bifrostd/orders.jsonl
      # Fail-closed by default in bifrostd (server.ts) — this dev/demo stack
      # deliberately opts in so demo/'s "Generate Test Invoice" and
      # "Simulate Payment" buttons work locally.
      DEMO_ENDPOINTS_ENABLED: "true"
    command:
      - sh
      - -c
      - |
        echo 'bifrostd: waiting for host build (bifrostd/dist/index.js)...'
        until [ -f /repo/bifrostd/dist/index.js ]; do sleep 2; done
        echo 'bifrostd: starting api/ gateway'
        exec node /repo/bifrostd/dist/index.js
    init: true
    depends_on:
      fnn-hub: { condition: service_started }
